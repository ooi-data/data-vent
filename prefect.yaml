# Generic metadata about this project
name: data-vent
prefect-version: 2.14.15

# build section allows you to manage and build docker images
build:

# push section allows you to manage if and how this project is uploaded to remote locations
push:

# pull section allows you to provide instructions for cloning this project in remote locations
pull:
- prefect.deployments.steps.git_clone:
    repository: https://github.com/ooi-data/data-vent.git
    branch: main
# the deployments section allows you to provide configuration for deploying flows
deployments:
- name: stream_ingest_2vcpu_16gb
  version:
  tags: []
  description:
  entrypoint: data_vent/flow.py:stream_ingest
  parameters: {}
  work_pool:
    name: data-harvest-push-pool
    work_queue_name:
    job_variables:
      task_definition_overrides:
        containerDefinitions:
          - name: prefect
            repositoryCredentials:
              credentialsParameter: "arn:aws:secretsmanager:us-west-2:688122822031:secret:jdduprey-dockerhub-creds-iouyGp"
  schedule:
  is_schedule_active: true
- name: run_stream_ingest_2vcpu_16gb
  version:
  tags: []
  description:
  entrypoint: data_vent/flow.py:run_stream_ingest
  parameters: {}
  work_pool:
    name: data-harvest-push-pool
    work_queue_name:
    job_variables:
      task_definition_overrides:
        containerDefinitions:
          - name: prefect
            repositoryCredentials:
              credentialsParameter: "arn:aws:secretsmanager:us-west-2:688122822031:secret:jdduprey-dockerhub-creds-iouyGp"
  schedule:
  is_schedule_active: true
- name: stream_ingest_4vcpu_30gb
  version:
  tags: []
  description:
  entrypoint: data_vent/flow.py:stream_ingest
  parameters: {}
  work_pool:
    name: data-harvest-push-pool
    work_queue_name:
    job_variables:
      cpu: 4096
      memory: 30720
      task_definition_overrides:
        containerDefinitions:
          - name: prefect
